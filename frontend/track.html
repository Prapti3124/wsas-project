<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAKHI Live Tracking</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?v=2.1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <style>
    :root {
      --bg-dark: #0f101f;
      --card-bg: #1a1b2e;
      --pink-primary: #e91e63;
      --pink-light: #ff6090;
    }
    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
    }
    #map {
      height: 100vh;
      width: 100vw;
      filter: contrast(1.1) saturate(1.2);
    }
    .tracking-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(26, 27, 46, 0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 15px 20px;
      border-bottom: 1px solid rgba(233, 30, 140, 0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .pulse-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: #00e676;
      border-radius: 50%;
      box-shadow: 0 0 10px #00e676;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
    }
    .loading-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .user-avatar {
        width: 40px; height: 40px; border-radius: 50%;
        background: var(--pink-primary);
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-pink mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h4 class="fw-bold">Locating User...</h4>
    <p class="text-secondary" id="loadingMsg">Verifying secure token</p>
  </div>

  <div class="tracking-header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
      <div class="user-avatar" id="userInitial">?</div>
      <div>
        <h5 class="m-0 fw-bold d-flex align-items-center gap-2">
          <span id="userName">Tracking User</span> 
          <span class="badge bg-success rounded-pill" style="font-size: 0.6rem;"><span class="pulse-dot me-1"></span> LIVE</span>
        </h5>
        <div class="text-muted small mt-1">
          <i class="fas fa-clock text-pink me-1"></i> Updated: <span id="lastUpdated">Just now</span>
        </div>
      </div>
    </div>
    
    <div class="text-end">
        <a id="phoneLink" href="#" class="btn btn-outline-light btn-sm rounded-pill px-3" style="border-color: var(--pink-primary); color: var(--pink-primary);">
            <i class="fas fa-phone-alt me-1"></i> Call
        </a>
    </div>
  </div>

  <div id="map"></div>

  <!-- Error Modal -->
  <div class="modal fade" id="errorModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background-color: var(--card-bg); border: 1px solid rgba(233, 30, 140, 0.3);">
        <div class="modal-body text-center p-5">
          <i class="fas fa-link-slash fa-4x text-danger mb-4"></i>
          <h4 class="fw-bold text-white mb-2">Session Ended</h4>
          <p class="text-muted" id="errorText">This tracking link has expired or the user has stopped sharing their location.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    let map = null;
    let marker = null;
    let pulseCircle = null;

    if (!token) {
        showError("Invalid tracking link. No token provided.");
    } else {
        initTracking();
    }

    function showError(msg) {
        document.getElementById('loadingOverlay').classList.add('d-none');
        document.getElementById('errorText').textContent = msg;
        const errModal = new bootstrap.Modal(document.getElementById('errorModal'));
        errModal.show();
    }

    async function fetchLocation() {
        try {
            const res = await fetch(`/api/location/tracking/public/${token}`);
            if (res.status === 202) {
                const data = await res.json();
                return { isWaiting: true, name: data.name };
            }
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.error || "Session ended");
            }
            return await res.json();
        } catch(e) {
            throw e;
        }
    }

    async function initTracking() {
        try {
            const data = await fetchLocation();
            
            // Setup UI
            document.getElementById('userName').textContent = data.name;
            document.getElementById('userInitial').textContent = data.name.charAt(0).toUpperCase();
            
            if (data.isWaiting) {
                document.getElementById('loadingMsg').textContent = "Waiting for " + data.name + "'s device to send location...";
                // Keep polling until we get actual data
                setTimeout(initTracking, 5000);
                return;
            }

            if (data.phone) {
                document.getElementById('phoneLink').href = `tel:${data.phone}`;
            } else {
                document.getElementById('phoneLink').classList.add('d-none');
            }
            updateTime(data.recorded_at);

            // Initialize Map
            map = L.map('map', { zoomControl: false }).setView([data.latitude, data.longitude], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            marker = L.circleMarker([data.latitude, data.longitude], {
                radius: 10, fillColor: '#e91e63', color: '#fff', weight: 2, fillOpacity: 1
            }).addTo(map);

            pulseCircle = L.circleMarker([data.latitude, data.longitude], {
                radius: 30, fillColor: 'transparent', color: '#e91e63', weight: 1, opacity: 0.6
            }).addTo(map);

            document.getElementById('loadingOverlay').classList.add('d-none');

            // Start Polling Loop (every 5 seconds)
            setInterval(updateLocation, 5000);

        } catch(e) {
            showError(e.message);
        }
    }

    async function updateLocation() {
        try {
            const data = await fetchLocation();
            if (data.isWaiting) return; // Keep waiting for next poll

            const latlng = [data.latitude, data.longitude];
            
            if (marker) {
                marker.setLatLng(latlng);
                pulseCircle.setLatLng(latlng);
                map.panTo(latlng, { animate: true });
            }
            
            updateTime(data.recorded_at);
        } catch(e) {
            // Optional: Show a subtle warning instead of a modal to handle network jitter
            console.warn("Update failed:", e);
        }
    }

    function updateTime(isoString) {
        const date = new Date(isoString);
        let hours = date.getHours();
        let mins = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        mins = mins < 10 ? '0' + mins : mins;
        document.getElementById('lastUpdated').textContent = `${hours}:${mins} ${ampm}`;
    }
  </script>
</body>
</html>
